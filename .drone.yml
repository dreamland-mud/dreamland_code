---
kind: pipeline
type: exec
name: default
concurrency:
  limit: 1

clone:
  disable: true

steps:
- name: full_rebuild
  commands:
  - eval `ssh-agent -s`
  - ssh-add /home/dreamland/.ssh/drone
  - cd /home/dreamland/dreamland_code
  - git pull
  - kill -9 $SSH_AGENT_PID
  - make -f Makefile.git
  - cd ../objs
  - ../dreamland_code/configure --prefix=/home/dreamland/runtime
  - rm -f plug-ins/*/lib*cpp plug-ins/*/*/lib*cpp
  # ~/objs is persistent and the build is incremental, so a change to a GLOBAL
  # compiler flag would silently apply to only the TUs whose sources changed
  # (this bit us with -fno-gnu-unique). Force a full recompile whenever the flag
  # sources change. CXXFLAGS is assembled from configure.ac AND admin/acinclude.m4.in
  # (-std/-Og/charset live in the latter). Stamp their content next to the objects:
  # git-mechanics-independent and self-healing across failed builds / manual resets.
  - if ! cat ../dreamland_code/configure.ac ../dreamland_code/admin/acinclude.m4.in | cmp -s - .flags.stamp; then find . \( -name '*.o' -o -name '*.lo' \) -delete && cat ../dreamland_code/configure.ac ../dreamland_code/admin/acinclude.m4.in > .flags.stamp; fi
  - make -j 2
  - make install

- name: discord_failure
  commands:
  - >
    echo "{\"embeds\":[{\"color\": 13632027,\"description\":\"Latest dreamland_code failed to build, what have you done, mate?\n\",\"title\":\"Deployment failed!\"}], \"username\":\"Drone Bot\", \"avatar_url\": \"https://docs.drone.io/logo.svg\"}" \
    | /home/dreamland/runtime/bin/idiscord-code
  when:
    status:
      - failure
  
- name: discord_success
  commands:
  - >
    echo "{\"embeds\":[{\"color\": 8311585,\"description\":\"Latest dreamland_code build was successful, you can reboot\n\",\"title\":\"Deployment successful\"}], \"username\":\"Drone Bot\", \"avatar_url\": \"https://docs.drone.io/logo.svg\"}" \
    | /home/dreamland/runtime/bin/idiscord-code
  when:
    status:
      - success

trigger:
  branch:
  - master
  event:
  - push
